name: Build ImmortalWrt (Final Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Set env
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget curl \
          qemu-utils

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git

      - name: Add iStore
        run: |
          cd immortalwrt
          git clone https://github.com/linkease/istore package/istore

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ✅ 固定IP + 双DNS（已避免YAML坑）
      - name: Set default network
        run: |
          cd immortalwrt
          mkdir -p files/etc/config

          echo "config interface 'loopback'" > files/etc/config/network
          echo "        option device 'lo'" >> files/etc/config/network
          echo "        option proto 'static'" >> files/etc/config/network
          echo "        option ipaddr '127.0.0.1'" >> files/etc/config/network
          echo "        option netmask '255.0.0.0'" >> files/etc/config/network
          echo "" >> files/etc/config/network

          echo "config globals 'globals'" >> files/etc/config/network
          echo "        option ula_prefix 'auto'" >> files/etc/config/network
          echo "" >> files/etc/config/network

          echo "config device" >> files/etc/config/network
          echo "        option name 'br-lan'" >> files/etc/config/network
          echo "        option type 'bridge'" >> files/etc/config/network
          echo "        list ports 'eth0'" >> files/etc/config/network
          echo "" >> files/etc/config/network

          echo "config interface 'lan'" >> files/etc/config/network
          echo "        option device 'br-lan'" >> files/etc/config/network
          echo "        option proto 'static'" >> files/etc/config/network
          echo "        option ipaddr '10.10.10.2'" >> files/etc/config/network
          echo "        option netmask '255.255.255.0'" >> files/etc/config/network
          echo "        option gateway '10.10.10.1'" >> files/etc/config/network
          echo "        list dns '223.5.5.5'" >> files/etc/config/network
          echo "        list dns '1.1.1.1'" >> files/etc/config/network

      - name: Load config
        run: |
          cd immortalwrt

          make defconfig

          ./scripts/config/config -e TARGET_x86
          ./scripts/config/config -e TARGET_x86_64
          ./scripts/config/config -e TARGET_x86_64_DEVICE_generic

          ./scripts/config/config -e PACKAGE_luci
          ./scripts/config/config -e PACKAGE_luci-ssl

          # iStore
          ./scripts/config/config -e PACKAGE_luci-app-store
          ./scripts/config/config -e PACKAGE_istore

      - name: Compile
        run: |
          cd immortalwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86
          path: immortalwrt/bin/targets/
