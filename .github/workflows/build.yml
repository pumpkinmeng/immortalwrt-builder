name: Build ImmortalWrt (Minimal Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Set env
        run: echo FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 rsync unzip zlib1g-dev file wget curl

      - name: Clone ImmortalWrt source
        run: git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Copy custom files
        run: cp -r immortalwrt/* openwrt/

      - name: Run DIY Part1 (packages)
        run: |
          cd openwrt
          chmod +x diy-part1.sh
          ./diy-part1.sh

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load defconfig
        run: |
          cp immortalwrt/defconfig openwrt/.config
          cd openwrt
          make defconfig

      - name: Run DIY Part2 (system tweaks)
        run: |
          cd openwrt
          chmod +x diy-part2.sh
          ./diy-part2.sh

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86
          path: openwrt/bin/targets/
