name: Build ImmortalWrt (Pro)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Set env
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget curl \
          qemu-utils

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git

      # ✅ 加入 iStore（关键）
      - name: Add iStore
        run: |
          cd immortalwrt
          git clone https://github.com/linkease/istore package/istore

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ✅ 配置（避免 heredoc 坑，用 echo 更稳）
      - name: Load config
        run: |
          cd immortalwrt

          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config

          # iStore
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
          echo "CONFIG_PACKAGE_istore=y" >> .config

          make defconfig

      - name: Compile
        run: |
          cd immortalwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86
          path: immortalwrt/bin/targets/
