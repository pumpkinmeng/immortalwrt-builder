name: Build ImmortalWrt (iStore FINAL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Set env
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget curl \
          qemu-utils

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git

      # ⭐关键：用 feeds 引入 istore（不是 git clone）
      - name: Add iStore feed
        run: |
          cd immortalwrt
          echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set network
        run: |
          cd immortalwrt
          mkdir -p files/etc/config

          cat > files/etc/config/network <<EOF
config interface 'loopback'
        option device 'lo'
        option proto 'static'
        option ipaddr '127.0.0.1'
        option netmask '255.0.0.0'

config globals 'globals'
        option ula_prefix 'auto'

config device
        option name 'br-lan'
        option type 'bridge'
        list ports 'eth0'

config interface 'lan'
        option device 'br-lan'
        option proto 'static'
        option ipaddr '10.10.10.2'
        option netmask '255.255.255.0'
        option gateway '10.10.10.1'
        list dns '223.5.5.5'
        list dns '1.1.1.1'
EOF

      - name: Load config
        run: |
          cd immortalwrt
          rm -f .config

          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config

          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config

          make defconfig

      - name: Compile
        run: |
          cd immortalwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86
          path: immortalwrt/bin/targets/
