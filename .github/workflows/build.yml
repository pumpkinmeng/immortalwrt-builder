name: Build ImmortalWrt (Final Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Set env
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3 rsync unzip zlib1g-dev file wget curl \
          qemu-utils

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git

      # ✅ iStore（必须在 feeds 前）
      - name: Add iStore
        run: |
          cd immortalwrt
          git clone https://github.com/linkease/istore package/istore

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ✅ 用官方方式写配置（不会被覆盖）
      - name: Load config
        run: |
          cd immortalwrt

          make defconfig

          ./scripts/config -e TARGET_x86
          ./scripts/config -e TARGET_x86_64
          ./scripts/config -e TARGET_x86_64_DEVICE_generic

          ./scripts/config -e PACKAGE_luci
          ./scripts/config -e PACKAGE_luci-ssl

          # ✅ iStore（核心）
          ./scripts/config -e PACKAGE_luci-app-store
          ./scripts/config -e PACKAGE_istore

      - name: Compile
        run: |
          cd immortalwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86
          path: immortalwrt/bin/targets/
