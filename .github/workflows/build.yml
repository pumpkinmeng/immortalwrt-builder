name: Build ImmortalWrt (Step 1)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev python3 rsync unzip zlib1g-dev file wget curl

    - name: Clone ImmortalWrt
      run: |
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load x86 config
      run: |
        cd immortalwrt

        cat > .config <<EOF
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y

        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl=y
        EOF

        make defconfig

    - name: Compile
      run: |
        cd immortalwrt
        make download -j8
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: immortalwrt/bin/targets/
